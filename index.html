<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Card</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="card">
      <div class="slider">
        <div class="slide-track">
          <img src="./images/pic1.jpg" alt="Calm Beige" />
          <img src="./images/pic2.jpg" alt="Carbon Black" />
          <img src="./images/pic3.jpg" alt="Carbon Black - Airwave Max 5" />
          <img src="./images/pic4.jpg" alt="Cobalt Blue" />
          <img src="./images/pic5.jpg" alt="Forest Green" />
          <img src="./images/pic6.jpg" alt="Forest Green - Airwave Max XR" />
          <img src="./images/pic7.jpg" alt="Mauve Haze" />
          <img src="./images/pic8.jpg" alt="Pearl Beige" />
          <img src="./images/pic9.jpg" alt="Carbon Black - Airwave Max XR" />
        </div>
      </div>

      <div class="card-content">
        <div class="product-name">Wireless Headphones</div>
        <div class="price">₹1,999</div>

        <button class="btn">Add to Cart</button>
      </div>
    </div>
  </body>
</html>
